      <stop stop-color="#0F172A"/><stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <filter id="monGlow"><feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#22D3EE" flood-opacity="0.35"/></filter>
  </defs>
  <g filter="url(#monGlow)">
