    <rect x="22" y="22" width="296" height="196" rx="6" fill="url(#screen)" stroke="#1E293B" stroke-width="2"/>
    <!-- Code content -->
    <text x="36" y="52" fill="#60A5FA" font-family="Consolas,monospace" font-size="13">&lt;html&gt;</text>
    <text x="48" y="72" fill="#4ADE80" font-family="Consolas,monospace" font-size="12">  &lt;title&gt;Berkverse&lt;/title&gt;</text>
    <text x="48" y="92" fill="#F8FAFC" font-family="Consolas,monospace" font-size="12">  &lt;h1&gt;Hello World!&lt;/h1&gt;</text>
    <text x="36" y="112" fill="#60A5FA" font-family="Consolas,monospace" font-size="13">&lt;/html&gt;</text>
    <text x="36" y="140" fill="#FBBF24" font-family="Consolas,monospace" font-size="12">function develop() {</text>
    <text x="52" y="160" fill="#4ADE80" font-family="Consolas,monospace" font-size="12">  keepCoding();</text>
    <text x="36" y="180" fill="#FBBF24" font-family="Consolas,monospace" font-size="12">}</text>
    <rect x="36" y="188" width="8" height="14" fill="#22D3EE" opacity="0.8"/>
    <!-- Screen glow -->
