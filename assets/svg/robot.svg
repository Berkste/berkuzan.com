<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 90" fill="none">
  <defs>
    <linearGradient id="metal" x1="35" y1="0" x2="35" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#94A3B8"/><stop offset="1" stop-color="#475569"/>
    </linearGradient>
    <filter id="eyeGlow"><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <ellipse cx="35" cy="86" rx="22" ry="4" fill="#000" opacity="0.2"/>
  <!-- Antenna -->
  <line x1="35" y1="8" x2="35" y2="18" stroke="#64748B" stroke-width="2"/>
  <circle cx="35" cy="6" r="4" fill="#14B8A6" filter="url(#eyeGlow)"/>
  <!-- Head -->
  <rect x="18" y="18" width="34" height="28" rx="8" fill="url(#metal)" stroke="#334155" stroke-width="1.5"/>
  <!-- Eyes -->
  <circle cx="28" cy="32" r="5" fill="#0F172A"/>
  <circle cx="42" cy="32" r="5" fill="#0F172A"/>
  <circle cx="28" cy="32" r="3" fill="#14B8A6" filter="url(#eyeGlow)"/>
  <circle cx="42" cy="32" r="3" fill="#14B8A6" filter="url(#eyeGlow)"/>
  <!-- Mouth -->
  <rect x="26" y="40" width="18" height="3" rx="1.5" fill="#334155"/>
  <!-- Body -->
  <rect x="20" y="48" width="30" height="28" rx="6" fill="#64748B" stroke="#475569" stroke-width="1"/>
  <circle cx="35" cy="62" r="6" fill="#0F172A" stroke="#14B8A6" stroke-width="1"/>
  <!-- Arms -->
  <rect x="8" y="50" width="10" height="20" rx="4" fill="#94A3B8"/>
  <rect x="52" y="50" width="10" height="20" rx="4" fill="#94A3B8"/>
  <!-- Legs -->
  <rect x="24" y="76" width="10" height="12" rx="3" fill="#475569"/>
  <rect x="36" y="76" width="10" height="12" rx="3" fill="#475569"/>
  <!-- Unity hint -->
  <path d="M32 58 L35 54 L38 58 L35 66 Z" fill="#F59E0B" opacity="0.8"/>
</svg>
