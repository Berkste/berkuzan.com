<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 80" fill="none">
  <defs>
    <linearGradient id="box" x1="35" y1="20" x2="35" y2="70" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F59E0B"/><stop offset="1" stop-color="#B45309"/>
    </linearGradient>
  </defs>
  <ellipse cx="35" cy="77" rx="22" ry="3" fill="#000" opacity="0.15"/>
  <!-- Post -->
  <rect x="32" y="55" width="6" height="22" fill="#78350F"/>
  <!-- Mailbox body -->
  <rect x="10" y="25" width="50" height="32" rx="4" fill="url(#box)" stroke="#92400E" stroke-width="1.5"/>
  <!-- Door -->
  <rect x="14" y="29" width="42" height="24" rx="2" fill="#D97706" stroke="#92400E" stroke-width="1"/>
  <!-- Flag -->
  <rect x="52" y="15" width="3" height="18" fill="#78350F"/>
  <path d="M55 15 L68 20 L55 25 Z" fill="#EF4444"/>
  <!-- Slot -->
  <rect x="22" y="38" width="26" height="3" rx="1" fill="#78350F" opacity="0.5"/>
  <!-- Magic sparkle -->
  <circle cx="18" cy="30" r="2" fill="#FDE68A" opacity="0.8"/>
  <circle cx="48" cy="28" r="1.5" fill="#FDE68A" opacity="0.6"/>
  <!-- Envelope peek -->
  <rect x="28" y="42" width="14" height="8" rx="1" fill="#FEF3C7" opacity="0.7"/>
