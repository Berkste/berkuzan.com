    <polygon points="68,90 48,130 88,130" fill="#15803D" stroke="#000" stroke-width="1.5"/>
    <rect x="200" y="110" width="18" height="72" fill="#422006"/>
    <polygon points="209,75 185,118 233,118" fill="#166534" stroke="#000" stroke-width="1.5"/>
    <!-- Campfire -->
    <circle cx="170" cy="175" r="14" fill="#F59E0B" opacity="0.9"/>
    <circle cx="170" cy="175" r="8" fill="#FDE68A"/>
    <!-- Pixel character -->
    <rect x="148" y="148" width="12" height="18" fill="#DC2626"/>
    <circle cx="154" cy="140" r="8" fill="#FFDFC4" stroke="#000" stroke-width="1.5"/>
    <path d="M130 236 L210 236 L195 260 L145 260 Z" fill="#334155" stroke="#000" stroke-width="2.5"/>
    <rect x="115" y="260" width="110" height="10" rx="4" fill="#475569" stroke="#000" stroke-width="2"/>
