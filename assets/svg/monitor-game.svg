      <stop stop-color="#374151"/><stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="gGlow"><feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#4ADE80" flood-opacity="0.25"/></filter>
  </defs>
  <g filter="url(#gGlow)">
    <rect x="8" y="8" width="324" height="228" rx="12" fill="url(#gBezel)" stroke="#000" stroke-width="3"/>
    <rect x="22" y="22" width="296" height="196" rx="6" fill="#0A0F1A" stroke="#1E293B" stroke-width="2"/>
    <text x="36" y="48" fill="#4ADE80" font-family="Consolas,monospace" font-size="13" font-weight="bold">&gt; LIFE'S SHORT.</text>
    <text x="36" y="68" fill="#4ADE80" font-family="Consolas,monospace" font-size="11">&gt; CODE SOMETHING AWESOME.</text>
    <!-- Pixel forest scene -->
    <rect x="36" y="82" width="268" height="120" rx="4" fill="#14532D"/>
    <rect x="36" y="182" width="268" height="20" fill="#166534"/>
    <!-- Trees -->
