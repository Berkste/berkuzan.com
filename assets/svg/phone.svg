<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 90" fill="none">
  <defs>
    <linearGradient id="phoneBody" x1="25" y1="5" x2="25" y2="85" gradientUnits="userSpaceOnUse">
      <stop stop-color="#334155"/><stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="phoneScreen" x1="25" y1="12" x2="25" y2="72" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14B8A6"/><stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
  </defs>
  <ellipse cx="25" cy="87" rx="16" ry="3" fill="#000" opacity="0.15"/>
  <!-- Phone body -->
  <rect x="10" y="5" width="30" height="78" rx="6" fill="url(#phoneBody)" stroke="#475569" stroke-width="1.5"/>
  <!-- Screen -->
